<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yojna.ai - Hero Page</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <section class="hero section">
    <div class="container">
      <div class="hero-grid">
        <div>
          <div class="section-label" style="margin-bottom: 2rem;">
            <span class="dot"></span>
            <span>Eligibility Checker</span>
          </div>
          <h1 class="display" style="margin-bottom: 1rem;">Discover Your <span class="gradient-text">Benefits</span></h1>
          <p class="body" style="margin-bottom: 3rem; max-width: 28rem;">Find personalized government schemes and benefits tailored to your profile. Get instant eligibility results with our AI-powered assessment.</p>
          
          <div class="card" style="padding: 2rem; max-width: 28rem;">
            <form id="schemeForm">
              <div style="margin-bottom: 1.5rem;">
                <label for="fullName" class="body" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Full Name</label>
                <input type="text" id="fullName" name="fullName" class="input" required>
              </div>
              
              <div style="margin-bottom: 1.5rem;">
                <label for="dob" class="body" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Date of Birth</label>
                <input type="date" id="dob" name="dob" class="input" required>
              </div>
              
              <div style="margin-bottom: 1.5rem;">
                <label for="familyIncome" class="body" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Family Income (Annual)</label>
                <input type="number" id="familyIncome" name="familyIncome" class="input" placeholder="Enter amount in INR" required>
              </div>
              <div style="margin-bottom: 1.5rem;">
                <label for="occupation" class="body" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Occupation</label>
                <input type="text" id="occupation" name="occupation" class="input" placeholder="e.g., Student, Farmer, Employee" required>
              </div>
              
              <div style="margin-bottom: 2rem;">
                <label for="gender" class="body" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Gender</label>
                <select id="gender" name="gender" class="select" required>
                  <option value="">Select Gender</option>
                  <option value="male">Male</option>
                  <option value="female">Female</option>
                  <option value="other">Other</option>
                </select>
              </div>
              
              <button type="submit" class="btn btn-primary" style="width: 100%;">Check Eligibility</button>
            </form>
          </div>
        </div>
        
        <div class="hero-graphic">
          <div class="ring"></div>
          <div class="floating-card card1"></div>
          <div class="floating-card card2"></div>
          <div class="accent-block"></div>
          <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
